{% load static %}
<nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <a href="/" class="flex items-center space-x-3 group min-w-0">
        <img
          src="{% static 'images/dentalstats-logo.svg' %}"
          alt="DentalStats logo"
          class="site-nav-brand-logo h-11 w-11 rounded-2xl object-contain shadow-[0_10px_24px_rgba(15,118,110,0.28)] transition-transform duration-300 group-hover:scale-105"
        >
        <div class="site-nav-brand-copy min-w-0">
          <h1 class="site-nav-brand-title text-xl font-bold">DentalStats</h1>
          <p class="site-nav-brand-subtitle text-xs text-teal-200">Biostatistics for Dental Research</p>
        </div>
      </a>

      <div class="hidden md:flex items-center space-x-8">
        <a href="/concepts/" data-nav-link="concepts" class="hover:text-teal-300 transition">Concepts</a>
        <a href="/calculator" data-nav-link="calculators" class="hover:text-teal-300 transition">Calculators</a>
        <a href="/visualization/live-graph" data-nav-link="visualizations" class="hover:text-teal-300 transition">Visualizations</a>
        <a href="/about" data-nav-link="about" class="hover:text-teal-300 transition">About Us</a>
      </div>

      <details class="md:hidden relative">
        <summary class="list-none flex items-center justify-center w-10 h-10 rounded-lg border border-white/15 bg-white/5 cursor-pointer hover:bg-white/10 transition" style="list-style: none;">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="7" x2="20" y2="7"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="17" x2="20" y2="17"></line>
          </svg>
        </summary>
        <div class="site-nav-mobile-menu absolute right-0 top-12 w-56 rounded-2xl border border-white/15 bg-slate-950/95 backdrop-blur-xl p-3 shadow-2xl">
          <div class="flex flex-col space-y-1 text-sm">
            <a href="/concepts/" data-nav-link="concepts" class="rounded-xl px-3 py-2 hover:bg-white/10 transition">Concepts</a>
            <a href="/calculator" data-nav-link="calculators" class="rounded-xl px-3 py-2 hover:bg-white/10 transition">Calculators</a>
            <a href="/visualization/live-graph" data-nav-link="visualizations" class="rounded-xl px-3 py-2 hover:bg-white/10 transition">Visualizations</a>
            <a href="/about" data-nav-link="about" class="rounded-xl px-3 py-2 hover:bg-white/10 transition">About Us</a>
            <a href="/" data-nav-link="home" class="rounded-xl px-3 py-2 border border-white/10 text-teal-200 hover:bg-white/10 transition">Home</a>
          </div>
        </div>
      </details>
    </div>
  </div>
</nav>
<script>
  (function () {
    const path = window.location.pathname;
    let active = 'home';

    if (path.startsWith('/concepts')) active = 'concepts';
    else if (path.startsWith('/calculator')) active = 'calculators';
    else if (path.startsWith('/visualization')) active = 'visualizations';
    else if (path.startsWith('/about')) active = 'about';

    document.querySelectorAll('[data-nav-link]').forEach((link) => {
      const isActive = link.getAttribute('data-nav-link') === active;
      link.classList.toggle('text-teal-300', isActive);
      link.classList.toggle('font-semibold', isActive);
      if (isActive && link.closest('details')) {
        link.classList.add('bg-white/10');
      }
    });
  })();
</script>
